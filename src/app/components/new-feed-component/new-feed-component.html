<form [formGroup]="newFeedForm" (ngSubmit)="onSubmit() ">

<div>
    <label for="name">Name</label>
    <input id="name" formControlName="name" >
</div>
<div>
    <label for="url">URL</label>
    <input id="url" formControlName="url" >
</div>



<button type="submit">Add Feed</button>







</form>
